######################################
# Coordinate and encoding common to all/many files
# How to handle the "Time" axis
dimensions:
  time:
    standard_name: time
    long_name: time
    bounds: "time_bnds"
    units: "days since 1750-01-01 00:00:00"
    calendar: "365_day" #or proleptic_gregorian
    axis: "T"
    coverage_content_type: "coordinate"
    #An ISO 19115-1 code to indicate the source of the data (image, thematicClassification, 
    # physicalMeasurement, auxiliaryInformation, qualityInformation, referenceInformation, modelResult, or coordinate).
    
variables:
  time_bnds:
    standard_name: "time_bnds"
    long_name: "Start and end points of each time step"
    # Probably not necessarily
    # units: "days since 2024-11-8T09:00:00Z"
    # calendar: "365_day" 
    # axis: "T"
    # coverage_content_type: "coordinate"

# Standard settings for all numeric variables
default_dimensions_encoding:
  # _FillValue: None # Coordinate variables should not have fill values.
  dtype: int32
  zlib: False
  # complevel: 4
  # shuffle: true
default_variable_encoding:
  _FillValue: NaN
  dtype: "float32"
  zlib: False
  # complevel: 4
  # shuffle: true

# Logic for finding data
processing:
  recursive: true
  output_dir: "../data/netcdf"
