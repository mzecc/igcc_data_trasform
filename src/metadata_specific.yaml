  earth_energy_imbalance/earth_energy_imbalance.csv:
    description:
      title: Earth Energy Imbalance and Earth Heat Inventory
      summary: >
        Time series of Earth Energy Imbalance (EEI) and associated Earth heat inventory
        components, based on observational datasets and consistent with IPCC AR6 methodology.
      keywords: Earth energy imbalance, EEI, ocean heat content, radiative flux, climate change
      source: >
        Ocean heat content datasets; GCOS Earth heat inventory components; AR6 methodology;
        CERES satellite observations (for comparison)
      # TODO check what references is meant to be
      references: >
        Forster et al. (2021, 2023, 2024, 2025); von Schuckmann et al. (2020, 2023);
        Cheng et al. (2019, 2022); Loeb et al. (2021, 2024)
      region: global
      time_coverage_resolution: P1Y

    dimensions:
      - time

    variable:
      atmosphere:
        long_name: Atmospheric heat content change
        #TODO: Thristram says ZJ/yr
        units: ZJ
        cell_methods: "area: time: sum"
        coordinates: time
        coverage_content_type: "modelResult"

      cryosphere:
        long_name: Cryosphere heat uptake (latent heat of ice melt)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      land:
        long_name: Continental land heat uptake
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_0_700m:
        long_name: Ocean heat content change in 0–700 m layer
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: "ocean_0_700m_error"

      ocean_0_700m_error:
        long_name: Uncertainty in ocean heat content change (0–700 m)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_700_2000m:
        long_name: Ocean heat content change in 700–2000 m layer
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: "ocean_700_2000m_error"

      ocean_700_2000m_error:
        long_name: Uncertainty in ocean heat content change (700–2000 m)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_2000_6000m:
        long_name: Ocean heat content change in 2000–6000 m layer
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: "ocean_2000_6000m_error"

      ocean_2000_6000m_error:
        long_name: Uncertainty in ocean heat content change (2000–6000 m)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_full_depth:
        long_name: Total ocean heat content change (full depth)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: "ocean_full_depth_error"
        comment: >
          Sum of ocean heat content changes across all depth layers.

      ocean_full_depth_error:
        long_name: Uncertainty in total ocean heat content change
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      total:
        long_name: Total Earth system heat uptake
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        comment: >
          Total heat content change of the Earth system, computed as the sum of
          ocean, land, atmosphere, and cryosphere contributions.

