  effective_radiative_forcing/ERF_best.csv:
    description:
      title: Effective Radiative Forcing Time Series relative to 1750
      summary: >
        Time series of effective radiative forcing (ERF) from anthropogenic and natural
        drivers relative to 1750, based on IPCC AR6 methodology and updated datasets.
      keywords: radiative forcing, ERF, greenhouse gases, aerosols, climate forcing
      source: >
        AR6-based methodology; updated greenhouse gas concentrations; aerosol datasets;
        solar forcing datasets
      references: >
        Forster et al. (2021, 2025); Smith et al. (2021);
        Szopa et al. (2021); Gulev et al. (2021)
      comment: >
        ERF represents the net change in Earth's energy budget due to external forcing
        agents. Positive values indicate a warming influence, while negative values
        indicate cooling.
      region: global
      time_coverage_resolution: P1Y
      reference_period: 1750

    dimensions:
      - time

    variable:
      # Aggregated
      total:
        # TODO: check standard_name
        # standard_name: toa_net_downward_radiative_flux
        long_name: Total effective radiative forcing relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"
        comment: >
          Computed as the aggregated sum of anthropogenic, solar, and volcanic forcing contributions relative to 1750

      anthro:
        long_name: Total anthropogenic effective radiative forcing relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"
        comment: >
          Computed as the aggregated sum of all anthropogenic forcing agents, i.e.
          CO2, Non-CO2 (Halogenated gases, N20 and CH4), O3, Aerosols and Minor relative to 1750

      nonco2wmghg:
        long_name: Effective radiative forcing from non-CO2 well-mixed greenhouse gases relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"
        comment: >
          Computed as the aggregated sum of CH4, N2O, and halogenated gases relative to 1750

      minor:
        long_name: Effective radiative forcing from minor components relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"
        comment: >
          Computed as the aggregated sum of Land Use, Contrails, Stratospheric H2O, BC Snow relative to 1750

      halogen:
        long_name: Effective radiative forcing from halogenated greenhouse gases relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"
        comment: >
          Computed as the aggregated sum of CFCs, HCFCs, HFCs, PFCs, and halogenated gases relative to 1750

      aerosol:
        long_name: Total aerosol effective radiative forcing relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"
        comment: >
          Computed as the aggregated sum of aerosol-radiation and aerosol-cloud interaction forcing components relative to 1750

      # Natural forcings
      solar:
        long_name: Effective radiative forcing from solar irradiance relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      volcanic:
        long_name: Effective radiative forcing from volcanic aerosols relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      # Aerosols and related effects
      aerosol-radiation_interactions:
        long_name: Effective radiative forcing from aerosol-radiation interactions relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      aerosol-cloud_interactions:
        long_name: Effective radiative forcing from aerosol-cloud interactions relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      BC_on_snow:
        long_name: Effective radiative forcing from black carbon on snow and ice relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      # Land and aviation
      land_use:
        long_name: Effective radiative forcing from land-use changes relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      contrails:
        long_name: Effective radiative forcing from contrails and contrail-induced cirrus relative to 1750
        units: "W m-2"
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      # Major greenhouse gases
      CO2:
        long_name: Effective radiative forcing from carbon dioxide relative to 1750
        units: "W m-2"
