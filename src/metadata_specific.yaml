  extreme_temperatures/txx_timeseries.csv:
    description:
      title: "Global Land Annual Maximum Temperature Anomalies relative to 1961–1990"
      summary: > 
        Annual anomalies of the maximum daily maximum near-surface air temperature (TXx) averaged over land (excluding Antarctica),
        based on HadEX3, Berkeley Earth, and ERA5 datasets.
      keywords: "temperature extremes, TXx, climate change, heat extremes, land temperature"
      source: "HadEX3 (Dunn et al., 2020); Berkeley Earth; ERA5 (Hersbach et al., 2020)"
      references: "Seneviratne et al. (2021); Forster et al. (2023, 2024, 2025); Dunn et al. (2020); Rohde et al. (2013); Hersbach et al. (2020); Wild et al. (2005)"
      comment: >
        TXx anomalies calculated relative to 1961–1990 baseline with an offset of 0.51 K applied to approximate 1850–1900 reference period. 
        Differences among datasets reflect varying spatial coverage, completeness, and methodology.
      time_coverage_resolution: P1Y
      type: input-datasets

    dimensions:
      - dataset
      - time

    variable:
      txx_extreme_temperature:
        standard_name: "air_temperature"
        long_name: "Annual maximum of daily maximum near-surface air temperature (TXx) anomaly over land relative to 1961–1990"
        units: "degC"
        units_metadata: "temperature: difference"
        cell_methods: "time: maximum within years time: mean (annual)"
        comment: "TXx defined as the annual maximum of daily maximum near-surface air temperature averaged over land grid cells (excluding Antarctica). Anomalies computed relative to 1961–1990 and adjusted by +0.51 K to approximate anomalies relative to 1850–1900."
        coverage_content_type: "modelResult"

    dimension_description:
      dataset_description:
        ERA5:
          long_name: "ERA5 (ECMWF Reanalysis v5)"

        Berkeley:
          long_name: "Berkeley Earth dataset"

        HadEX3:
          long_name: "HadEX3 climate extremes indices"

