  anthropogenic_warming/Gillett_GMST_timeseries.csv:
    description:
      title: Contributions to Global Mean Surface Temperature Change
      summary: >
        Time series of contributions to global surface temperature change relative to
        1850–1900, including anthropogenic, natural, greenhouse gas and other human
        forcing components, expressed as uncertainty percentiles
      keywords: "KEYWORDSSS"
      source: >
        "SOURCES"
      references: >
        "references"
      region: global
      time_coverage_resolution: P1Y

    dimensions:
      - percentile
      - time

    coordinate_description:
      percentile:
        long_name: 'percentile'
        units: "1"
        coverage_content_type: 'coordinate'
        comment: 'Percentiles of the temperature distribution.'

    variable:
      anthropogenic:
          standard_name: surface_temperature_anomaly
          # TODO repeat relative to 1850-1900 here as well
          long_name: Anthropogenic contribution to global surface temperature change relative to 1850-1900
          units: "degC"
          units_metadata: "temperature: difference"
          cell_methods: "area: time: mean"
          coverage_content_type: "modelResult"

            
      natural:
          standard_name: surface_temperature_anomaly
          long_name: Natural contribution to global surface temperature change
          units: "degC"
          units_metadata: "temperature: difference"
          cell_methods: "area: time: mean"
          coverage_content_type: "modelResult"

      ghg:
          standard_name: surface_temperature_anomaly
          long_name: Contribution to global surface temperature change from well-mixed greenhouse gases
          units: "degC"
          units_metadata: "temperature: difference"
          cell_methods: "area: time: mean"
          coverage_content_type: "modelResult"
          comment: >
           Contribution to global surface temperature change from other anthropogenic forcings consisting of CO2, CH4, N2O and F-gases 

      other_human_forcing:
          standard_name: surface_temperature_anomaly
          long_name: Contribution to global surface temperature change from other anthropogenic forcings
          units: "degC"
          units_metadata: "temperature: difference"
          cell_methods: "area: time: mean"
          coverage_content_type: "modelResult"
          comment: >
           Contribution to global surface temperature change from other anthropogenic forcings consisting of 
           aerosol–radiation interaction, aerosol–cloud interaction, black carbon on snow, contrails, ozone, stratospheric H2O and land use
          #######
  anthropogenic_warming/Gillett_GMST_rates.csv:
    description:
      title: Rate of Human-Induced Global Warming
      summary: >
        Time series of the rate of anthropogenic global surface temperature change expressed as annualised decadal trends derived from attribution methods.

      keywords: "KEYWORDSSS"
      source: >
        "SOURCES"
      references: >
        "references"
      region: global
      time_coverage_resolution: P10Y

    dimensions:
      - percentile
      - time

    coordinate_description:
      percentile:
        long_name: 'percentile'
        units: "1"
        coverage_content_type: 'coordinate'
        comment: 'Percentiles of the temperature distribution.'

    variable:
      anthropogenic:
          long_name: long_name to set
          units: "degC yr-1"
          units_metadata: "temperature: difference"
          cell_methods: "area: time: mean"
          coverage_content_type: "modelResult"

