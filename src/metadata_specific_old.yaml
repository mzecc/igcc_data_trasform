  sea_level_rise/IGCC_GMSL_ensemble.csv:
    description:
      title: Global Mean Sea-Level Rise (GMSL) Time Series
      summary: >
        Time series of observed global mean sea level based on tide gauge reconstructions
        and satellite altimetry, showing long-term rise and acceleration over the 20th
        and 21st centuries.
      keywords: sea level rise, ocean, climate change, altimetry, tide gauge, GMSL
      references: ""
      comment: >
        Global mean sea level rise is primarily driven by thermal expansion and
        land ice mass loss. The dataset merges tide gauge reconstructions with
        modern satellite observations.
      region: global
      time_coverage_resolution: P1Y

    dimensions:
      # - statistic
      - time

    variable:
      GMSL_mean:
        standard_name: "sea_surface_height_above_geoid"
        long_name: "Global mean sea level relative to 1995-2014 mean"
        units: "mm"
        units_metadata: "level: difference"
        cell_methods: "area: time: mean"
        coordinates: "time"
        coverage_content_type: "modelResult"

      GMSL_standard_deviation:
        standard_name: "sea_surface_height_above_geoid"
        long_name: "Global standard deviation of sea level" 
        # TODO check units here. Should we convert?
        units: "mm"
        # units_metadata: "level: difference"
        cell_methods: "area: time: standard deviation"
        coordinates: "time"
        coverage_content_type: "modelResult"

