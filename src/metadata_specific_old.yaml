######################################
  greenhouse_gas_emissions/greehouse_gas_emissions_co2eq.csv:

    description:
      title: Global Anthropogenic Greenhouse Gas Emissions
      summary: >
        Annual global anthropogenic greenhouse gas emissions following the IPCC AR6 WGIII
        framework, including CO2, CH4, N2O, and fluorinated gases expressed in CO2-equivalent
        using GWP100.
      keywords: greenhouse gases, emissions, CO2, methane, nitrous oxide, climate change
      source: >
        Global Carbon Budget 2025 (CO2); EDGAR v2025 (CH4, N2O, F-gases)
      references: >
        Dhakal et al. (2022); Canadell et al. (2021); Friedlingstein et al. (2025);
        Crippa et al. (2025); Forster et al. (2021)
      comment: >
        Emissions follow the IPCC AR6 WGIII system boundary (anthropogenic sources minus sinks).
        Differences with inventory-based estimates arise primarily from treatment of LULUCF and
        inclusion/exclusion of indirect anthropogenic effects.
      time_coverage_resolution: P1Y

    dimensions:
      - time

    variable:
      CO2_FFI:
        # LLMs say to remove the field
        # standard_name: THERE IS NO CF-compliant standard_name. 
        long_name: Carbon dioxide emissions from fossil fuels and industry
        # TODO: units are not compliant
        units: "Gt CO2"
        cell_methods: "time: sum"
        coverage_content_type: "modelResult"

      CO2_LULUCF:
        long_name: Net carbon dioxide emissions from land use, land-use change and forestry
        units: "Gt CO2"
        cell_methods: "time: sum"
