files:

  earth_energy_imbalance/earth_energy_imbalance.csv:
    description:
      title: Earth Energy Imbalance and Earth Heat Inventory
      summary: >
        Time series of Earth Energy Imbalance (EEI) and associated Earth heat inventory
        components, based on observational datasets and consistent with IPCC AR6 methodology.
      keywords: Earth energy imbalance, EEI, ocean heat content, radiative flux, climate change
      source: >
        Ocean heat content datasets; GCOS Earth heat inventory components; AR6 methodology;
        CERES satellite observations (for comparison)
      # TODO check what references is meant to be
      references: >
        Forster et al. (2021, 2023, 2024, 2025); von Schuckmann et al. (2020, 2023);
        Cheng et al. (2019, 2022); Loeb et al. (2021, 2024)
      region: global
      time_coverage_resolution: P1Y

    dimensions:
      - time

    variable:
      atmosphere:
        long_name: Atmospheric heat content change
        units: ZJ
        cell_methods: "area: time: sum"
        coordinates: time
        coverage_content_type: "modelResult"

      cryosphere:
        long_name: Cryosphere heat uptake (latent heat of ice melt)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      land:
        long_name: Continental land heat uptake
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_0_700m:
        long_name: Ocean heat content change in 0–700 m layer
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: ocean_0_700m_error

      ocean_0_700m_error:
        long_name: Uncertainty in ocean heat content change (0–700 m)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_700_2000m:
        long_name: Ocean heat content change in 700–2000 m layer
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: ocean_700_2000m_error

      ocean_700_2000m_error:
        long_name: Uncertainty in ocean heat content change (700–2000 m)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_2000_6000m:
        long_name: Ocean heat content change in 2000–6000 m layer
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: ocean_2000_6000m_error

      ocean_2000_6000m_error:
        long_name: Uncertainty in ocean heat content change (2000–6000 m)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      ocean_full_depth:
        long_name: Total ocean heat content change (full depth)
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        ancillary_variables: ocean_full_depth_error
        comment: >
          Sum of ocean heat content changes across all depth layers.

      ocean_full_depth_error:
        long_name: Uncertainty in total ocean heat content change
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"

      total:
        long_name: Total Earth system heat uptake
        units: ZJ
        cell_methods: "area: time: sum"
        coverage_content_type: "modelResult"
        comment: >
          Total heat content change of the Earth system, computed as the sum of
          ocean, land, atmosphere, and cryosphere contributions.

######################################
  global_land_precipitation/global_land_precipitation.csv:
    description:
      title: "Annual Global Land Precipitation Anomalies (Relative to 1991–2020)"
      summary: "Time series of global land precipitation anomalies derived from observational datasets, highlighting long-term trends, interannual variability, and regional heterogeneity in land precipitation."
      keywords: "precipitation, climate change, hydrological cycle, anomalies, land surface, global"
      source: "GPCC V2020; CRU TS 4.09; GPCP V2.3; GHCN V4 observational datasets"
      references: "Gulev et al. (2021); Douville et al. (2021); Cao et al. (2022); Forster et al. (2025); Schamm et al. (2014); Harris et al. (2020); Adler et al. (2018); Menne et al. (2018); Sun et al. (2018); Nogueira (2020); Yate and Ren (2025); Su et al. (2026); Dunn et al. (2024); Zhang et al. (2024b)"
      region: "land"
      time_coverage_resolution: P1Y

    dimensions:
      - dataset
      - time

    variable:
      # Variable name in the NetCDF file
      global_land_precipitation:
        # no standard name as it is an "anomaly"
        # standard_name: "precipitation_flux"
        # standard_name: "precipitation_amount" 
        long_name: "Annual global land precipitation anomaly relative to 1991–2020"
        # TODO: check units
        # units: "kg m-2 s-1"
        units: "kg m-2"
        units_metadata: "precipitation: difference"
        cell_methods: "area: mean where land time: sum"
        coordinates: "time"
        comment: "Global land precipitation anomaly computed relative to the 1991–2020 climatological baseline. Derived from multiple observational datasets (GPCC V2020, CRU TS 4.09, GPCP V2.3, GHCN V4). Differences among datasets arise from input data, spatial coverage, and gridding methods."
        coverage_content_type: "modelResult"

    dimension_description:
      dataset_description:
        GPCC:
          long_name: "Global Precipitation Climatology Centre"

        CRU:
          long_name: "Climatic Research Unit"

        GPCP:
          long_name: "Global Precipitation Climatology Project"

        GHCN:
          long_name: "Global Historical Climatology Network"

######################################
  global_mean_temperatures/annual_averages.csv:
    description:
      title: Global Mean Surface Temperature Change
      summary: >
        Observed global mean surface temperature anomalies relative to 1850–1900, based on
        multiple observational datasets and consistent with IPCC AR6 methodology, showing
        long-term warming and interannual variability.
      keywords: temperature, global warming, GMST, climate change, surface temperature
      source: Multi-dataset ensemble following IPCC AR6 (HadCRUT, Berkeley Earth, NOAA, ERA-type datasets)
      references: >
        Gulev et al. (2021); Lee et al. (2023); Forster et al. (2023, 2025)
      region: global
      time_coverage_resolution: P1Y

    dimensions:
      - time

    variable:
      gmst_anomaly:
        standard_name: air_temperature
        long_name: Global annual mean surface temperature anomaly relative to 1850–1900
        units: "degC"
        cell_methods: "area: time: mean"
        coordinates: time
        coverage_content_type: "modelResult"

