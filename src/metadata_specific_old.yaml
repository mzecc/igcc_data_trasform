######################################
  marine_heatwave_days/MHW_days_per_year_combined.csv:
    description:
      title: Global Marine Heatwave Days
      summary: >
        Annual global mean number of marine heatwave days based on multiple satellite
        and reanalysis datasets, following AR6 methodology. Demonstrates strong
        increases in frequency of extreme ocean temperature events.
        Marine heatwaves are defined using percentile-based thresholds applied
        to deseasonalized SST anomalies.
      keywords: marine heatwaves, SST extremes, ocean warming, climate extremes
      source: >
        ERA5 reanalysis; NOAA OISST; OSTIA; NOAA Coral Reef Watch SST
      references: >
        Fox-Kemper et al. (2021); Collins et al. (2019); Frölicher et al. (2018);
        Oliver et al. (2018); Huang et al. (2021); Donlon et al. (2012);
        Hersbach et al. (2020); Liu et al. (2014)
      region: sea
      time_coverage_resolution: P1Y

    dimensions:
      - dataset
      - time

    variable:
      marine_heatwave_days:
        long_name: Global mean annual number of marine heatwave days
        units: "days"
        coordinates: "time"
        cell_methods: "area: mean time: sum"
        comment: >
          Marine heatwave (MHW) days defined as days when deseasonalized sea surface
          temperature exceeds the 99th percentile within an 11-day moving window
          relative to a 1985–2014 climatological baseline. Values represent the
          area-weighted global mean between 60S and 60N. Based on multiple datasets
          (ERA5, OISST, OSTIA, CRW). MHW detection excludes polar regions due to
          sea-ice variability. An offset relative to 1850–1900 baseline is applied
          to ensure consistency with preindustrial conditions.
        coverage_content_type: "modelResult"

    dimension_description:
      dataset_description:
        ERA5:
          long_name: "ERA5 (ECMWF Reanalysis v5)"

        OISST:
          long_name: "sjflsfjlsa"

        OSTIA:
          long_name: "dslkafjlsaf"

        CRW:
          long_name: "ldsafjlafhldsa"

        mean:
          long_name: "dfjsdja"

