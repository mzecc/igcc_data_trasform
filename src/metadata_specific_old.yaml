  greenhouse_gas_concentrations/ghg_concentrations.csv:
    description:
      title: Global Mean Atmospheric Concentrations of Well-Mixed Greenhouse Gases
      summary: >
        Time series of global mean atmospheric concentrations of 52 well-mixed greenhouse
        gases, based on NOAA GML, AGAGE, and literature datasets, updated through 2025
        and consistent with IPCC AR6 methodology.
      keywords: greenhouse gases, atmospheric concentrations, CO2, methane, nitrous oxide, halocarbons
      source: >
        NOAA Global Monitoring Laboratory; AGAGE network; literature compilations and AR6 dataset extensions
      references: >
        Lan et al. (2025); Dutton et al. (2024); Prinn et al. (2018, 2025);
        Western et al. (2025, 2026); Forster et al. (2025); Hodnebrog et al. (2020)
      comment: >
        Dataset includes globally averaged concentrations of well-mixed greenhouse gases.
        CO2 concentrations are reported on the WMO-CO2-X2019 calibration scale. Data are
        derived from observational networks and supplemented with extrapolations where
        necessary for minor gases.
      time_coverage_resolution: P1Y

    dimensions:
      - time

    variable:
      CO2:
        standard_name: mole_fraction_of_carbon_dioxide_in_air
        long_name: Global mean atmospheric mole fraction of carbon dioxide
        units: ppm
        coordinates: time
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      CH4:
        standard_name: mole_fraction_of_methane_in_air
        long_name: Global mean atmospheric mole fraction of methane
        units: ppb
        coordinates: time
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      N2O:
        standard_name: mole_fraction_of_nitrous_oxide_in_air
        long_name: Global mean atmospheric mole fraction of nitrous oxide
        units: ppb
        coordinates: time
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      HFC_134a:
        long_name: Global mean atmospheric mole fraction of HFC-134a
        units: ppt
        coordinates: time
        cell_methods: "area: time: mean"
        coverage_content_type: "modelResult"

      HFC_23:
        long_name: Global mean atmospheric mole fraction of HFC-23
