  global_land_precipitation/global_land_precipitation.csv:
    description:
      title: "Annual Global Land Precipitation Anomalies (Relative to 1991–2020)"
      summary: "Time series of global land precipitation anomalies derived from observational datasets, highlighting long-term trends, interannual variability, and regional heterogeneity in land precipitation."
      keywords: "precipitation, climate change, hydrological cycle, anomalies, land surface, global"
      source: "GPCC V2020; CRU TS 4.09; GPCP V2.3; GHCN V4 observational datasets"
      references: "Gulev et al. (2021); Douville et al. (2021); Cao et al. (2022); Forster et al. (2025); Schamm et al. (2014); Harris et al. (2020); Adler et al. (2018); Menne et al. (2018); Sun et al. (2018); Nogueira (2020); Yate and Ren (2025); Su et al. (2026); Dunn et al. (2024); Zhang et al. (2024b)"

    dimensions:
      - time
      - dataset

    variable:
      var_name: "global_land_precipitation"
      standard_name: "precipitation_flux"
      long_name: "Annual global land precipitation anomaly relative to 1991–2020"
      units: "kg m-2 s-1"
      cell_methods: "time: mean (annual) area: mean where land"
      coordinates: "time"
      comment: "Global land precipitation anomaly computed relative to the 1991–2020 climatological baseline. Derived from multiple observational datasets (GPCC V2020, CRU TS 4.09, GPCP V2.3, GHCN V4). Differences among datasets arise from input data, spatial coverage, and gridding methods."
      coverage_content_type: "physicalMeasurement"

    dimension_description:
      dataset_description:
        GPCC:
          long_name: "Global Precipitation Climatology Centre"

        CRU:
          long_name: "Climatic Research Unit"

        GPCP:
          long_name: "Global Precipitation Climatology Project"

        GHCN:
          long_name: "Global Historical Climatology Network"

  extreme_temperatures/txx_timeseries.csv:
    description:
      title: "Global Land TXx (Annual Maximum Temperature) Anomalies"
      summary: "Annual anomalies of the maximum daily maximum near-surface air temperature (TXx) averaged over land (excluding Antarctica), based on HadEX3, Berkeley Earth, and ERA5 datasets."
      keywords: "temperature extremes, TXx, climate change, heat extremes, land temperature"
      source: "HadEX3 (Dunn et al., 2020); Berkeley Earth; ERA5 (Hersbach et al., 2020)"
      references: "Seneviratne et al. (2021); Forster et al. (2023, 2024, 2025); Dunn et al. (2020); Rohde et al. (2013); Hersbach et al. (2020); Wild et al. (2005)"
      comment: "TXx anomalies calculated relative to 1961–1990 baseline with an offset of 0.51 K applied to approximate 1850–1900 reference period. Differences among datasets reflect varying spatial coverage, completeness, and methodology."

    dimensions:
      - time
      - dataset

    variable:
      var_name: "txx_extreme_temperature"
      standard_name: "air_temperature"
      long_name: "Annual maximum of daily maximum near-surface air temperature (TXx) anomaly over land relative to 1850–1900"
      units: "degC"
      units_metadata: "temperature: difference"
      cell_methods: "time: maximum within years time: mean (annual) area: mean where land"
      coordinates: "time"
      comment: "TXx defined as the annual maximum of daily maximum near-surface air temperature averaged over land grid cells (excluding Antarctica). Anomalies computed relative to 1961–1990 and adjusted by +0.51 K to approximate anomalies relative to 1850–1900."
      coverage_content_type: "physicalMeasurement"

    dimension_description:
      dataset_description:
        ERA5:
          long_name: "ERA5 (ECMWF Reanalysis v5)"

        Berkeley:
          long_name: "Berkeley Earth dataset"

        HadEX3:
          long_name: "HadEX3 climate extremes indices"

